{% extends "layout.html" %}
{% block title %}帳號管理{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
  <h1><i class="bi bi-people me-2"></i>帳號管理</h1>
  <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#newUserModal">
    <i class="bi bi-person-plus me-1"></i>新增帳號
  </button>
</div>

<!-- 新增帳號 Modal -->
<div class="modal fade" id="newUserModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold"><i class="bi bi-person-plus me-2 text-success"></i>新增帳號</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form method="post" action="{{ url_for('admin_create_user') }}">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">帳號 <span class="text-danger">*</span></label>
            <input type="text" name="username" class="form-control" required placeholder="英數字，如 john123">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">密碼 <span class="text-danger">*</span></label>
            <input type="text" name="password" class="form-control" required minlength="3" placeholder="初始密碼">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">顯示名稱 <span class="text-danger">*</span></label>
            <input type="text" name="display" class="form-control" required placeholder="中文姓名">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
          <button type="submit" class="btn btn-success"><i class="bi bi-check-lg me-1"></i>建立</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="card">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th>帳號</th>
          <th>顯示名稱</th>
          <th>角色</th>
          <th style="width:280px">重設密碼</th>
        </tr>
      </thead>
      <tbody>
        {% for u in users %}
        <tr>
          <td class="fw-semibold">{{ u.username }}</td>
          <td>{{ u.display }}</td>
          <td>
            {% if u.is_admin %}
            <span class="badge bg-danger">管理員</span>
            {% else %}
            <span class="badge bg-secondary">一般用戶</span>
            {% endif %}
          </td>
          <td>
            <form method="post" action="{{ url_for('admin_reset_password', username=u.username) }}"
                  class="d-flex gap-2" onsubmit="return confirm('確定要重設 {{ u.display }} 的密碼？')">
              <input type="password" name="new_password" class="form-control form-control-sm"
                     placeholder="輸入新密碼" required minlength="3" style="max-width:160px">
              <button type="submit" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-arrow-repeat me-1"></i>重設
              </button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <div class="p-3 text-muted small border-top">
    共 {{ users|length }} 位用戶
  </div>
</div>
{% endblock %}
