<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登入 — AI 開發管理平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a2e4a 0%, #253d5e 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Microsoft JhengHei', Arial, sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    .brand i { font-size: 2.4rem; color: #1a2e4a; }
    .brand h4 { color: #1a2e4a; font-weight: 700; margin-top: 8px; margin-bottom: 2px; }
    .btn-login {
      background: linear-gradient(135deg, #1a2e4a, #253d5e);
      color: #fff; border: none;
    }
    .btn-login:hover { opacity: .88; color: #fff; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: #adb5bd; font-size: .85rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #dee2e6;
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand text-center mb-4">
    <img src="/static/logo.png" alt="logo" style="height:64px;width:auto;margin-bottom:8px">
    <h4>物流本部AI開發管理平台</h4>
    <p class="text-muted small mb-0">請登入以存取完整功能</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 small mb-3">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="post">
    <input type="hidden" name="action" value="login">
    <div class="mb-3">
      <label class="form-label fw-semibold">帳號</label>
      <input type="text" name="username" class="form-control" placeholder="請輸入帳號" autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">密碼</label>
      <input type="password" name="password" class="form-control" placeholder="請輸入密碼">
    </div>
    <button type="submit" class="btn btn-login w-100 py-2 fw-semibold">
      <i class="bi bi-box-arrow-in-right me-2"></i>登入
    </button>
  </form>

  <div class="divider">或</div>

  <form method="post">
    <input type="hidden" name="action" value="guest">
    <button type="submit" class="btn btn-outline-secondary w-100 py-2">
      <i class="bi bi-eye me-2"></i>以訪客身份進入（僅供瀏覽）
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
