{% extends "layout.html" %}
{% block title %}修改密碼{% endblock %}

{% block content %}
<div class="page-header">
  <h1><i class="bi bi-key me-2"></i>修改密碼</h1>
</div>

<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">帳號</label>
          <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">舊密碼 <span class="text-danger">*</span></label>
          <input type="password" name="old_password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">新密碼 <span class="text-danger">*</span></label>
          <input type="password" name="new_password" class="form-control" required minlength="3">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">確認新密碼 <span class="text-danger">*</span></label>
          <input type="password" name="confirm_password" class="form-control" required minlength="3">
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>確認修改
          </button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">取消</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
